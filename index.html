<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nadtai bolzoond yvah uu? Hair minee ❤️</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    max-width:500px;
    width:90%;
}

h1{
    color:#ff4d6d;
}

.emoji{
    font-size:80px;
}

.buttons{
    margin-top:20px;
}

button{
    border:none;
    border-radius:10px;
    padding:15px 30px;
    font-size:18px;
    cursor:pointer;
    color:white;
    transition:0.3s;
    margin:10px;
}

#yesBtn{
    background:#28a745;
}

#noBtn{
    background:#dc3545;
}

input[type="date"]{
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-top:15px;
}

.hidden{
    display:none;
}

.success{
    color:#28a745;
    font-size:28px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="card" id="card">

    <div class="emoji">🥰</div>

    <h1>Nadtai bolzoond yvah uu? Hair minee ❤️</h1>

    <div class="buttons">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😢</button>
    </div>

</div>

<script>

window.addEventListener("DOMContentLoaded", () => {
    const card = document.getElementById("card");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");

    let size = 18;

    noBtn.addEventListener("click", () => {
        size += 8;
        yesBtn.style.fontSize = size + "px";
        yesBtn.style.padding = `${15 + size / 2}px ${30 + size}px`;
        console.log("No clicked, increasing Yes button size to", size);
    });

    yesBtn.addEventListener("click", () => {
        renderDatePicker();
    });

    function renderDatePicker() {
        card.innerHTML = `
            <div class="emoji">😍</div>
            <h1>Yay! ❤️</h1>
            <p>Choose a date for our date:</p>
            <input type="date" id="datePicker">
            <br><br>
            <button id="confirmDate" style="background:#ff4d6d;">Confirm Date 💕</button>
        `;

        const confirmDate = document.getElementById("confirmDate");
        const datePicker = document.getElementById("datePicker");

        if (confirmDate && datePicker) {
            confirmDate.addEventListener("click", () => {
                const selectedDate = datePicker.value;
                if (!selectedDate) {
                    alert("neg date songchoh ❤️");
                    return;
                }
                renderConfirmation(selectedDate);
            });
        } else {
            console.error("Date picker or confirm button not found after rendering.");
        }
    }

    function renderConfirmation(selectedDate) {
        card.innerHTML = `
            <div class="emoji">💘</div>
            <div class="success">Bolzuu shu!</div>
            <p style="margin-top:15px;">
                Bolzooni udur <3 :<br><br>
                <strong>${selectedDate}</strong>
            </p>
            <p style="margin-top:20px;">Sanaad bna haira 🥰</p>
        `;
        console.log("Date confirmed:", selectedDate);
    }
});

</script>

</body>
</html>
